<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>attack 4frame</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1f232b;color:#eef2f7;font-family:sans-serif}.wrap{text-align:center}canvas{width:256px;height:256px;image-rendering:pixelated;image-rendering:crisp-edges;background:transparent}</style></head><body><div class="wrap"><canvas id="canvas" width="64" height="64"></canvas><p>攻撃 4フレーム（余白強化シート）</p></div><script>const frameCount=4,frameDelay=120,cellWidth=96,frameWidth=64,frameHeight=64,offsetX=16,canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");ctx.imageSmoothingEnabled=false;const sheet=new Image();sheet.src="./mega_charizard_x_like_pixel_64_attack_4frame_spritesheet.png";let frame=0;function draw(){ctx.clearRect(0,0,frameWidth,frameHeight);ctx.drawImage(sheet,frame*cellWidth+offsetX,0,frameWidth,frameHeight,0,0,frameWidth,frameHeight);frame=(frame+1)%frameCount}sheet.onload=()=>{draw();setInterval(draw,frameDelay)};</script></body></html>
