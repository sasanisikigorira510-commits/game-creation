<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>preview</title>
<style>
body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.wrap { display: grid; gap: 16px; justify-items: center; }
.sprite { width: 256px; height: 256px; background-image: url('./dragon_ai_posefaithful_attack_4frame_spritesheet.png'); background-repeat: no-repeat; background-size: 1024px 256px; image-rendering: pixelated; image-rendering: crisp-edges; }
.note { font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sprite" id="sprite"></div>
  <div class="note">AI redraw / 4 frames / cell 64x64 / delay 120ms</div>
</div>
<script>
const frameCount = 4;
const cellWidth = 256;
const delay = 120;
const sprite = document.getElementById('sprite');
let index = 0;
function tick() {
  sprite.style.backgroundPosition = `${-index * cellWidth}px 0px`;
  index = (index + 1) % frameCount;
}
tick();
setInterval(tick, delay);
</script>
</body>
</html>
