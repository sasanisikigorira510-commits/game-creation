<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>attack2 preview</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #111827;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.wrap {
  display: grid;
  gap: 16px;
  justify-items: center;
}
.stage {
  width: 760px;
  height: 627px;
  display: grid;
  place-items: center;
}
.sprite {
  width: 760px;
  height: 627px;
  object-fit: contain;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.note {
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <img class="sprite" id="sprite" src="./wizard_attack2_preview_0.png" alt="attack2 preview">
  </div>
  <div class="note">attack2 / 4 frames / 120ms</div>
</div>
<script>
const frames = [
  "./wizard_attack2_preview_0.png",
  "./wizard_attack2_preview_1.png",
  "./wizard_attack2_preview_2.png",
  "./wizard_attack2_preview_3.png"
];
const delay = 120;
const sprite = document.getElementById("sprite");
let index = 0;
function tick() {
  sprite.src = frames[index];
  index = (index + 1) % frames.length;
}
tick();
setInterval(tick, delay);
</script>
</body>
</html>
